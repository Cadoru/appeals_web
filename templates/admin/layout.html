<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Админ-панель{% endblock %}</title>
  <link rel="icon" href="{{ url_for('favicon') }}" type="image/png" sizes="16x16">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body data-page="{% block page_id %}{% endblock %}" class="admin-layout">
  <div class="d-flex">
    <aside class="admin-sidebar p-3 text-white">
      <div class="admin-sidebar__brand d-flex align-items-center gap-2 mb-3">
        <img
          src="{{ url_for('static', filename='img/admin-logo.png') }}"
          alt=""
          class="admin-sidebar__logo"
          width="32"
          height="32"
        >
        <h2 class="h6 text-uppercase text-white-50 mb-0">Админ-панель</h2>
      </div>
      <nav class="nav flex-column">
        <a class="nav-link{% if active_page == 'users' %} active{% endif %}" href="{{ url_for('admin_users') }}">Пользователи</a>
        <a class="nav-link{% if active_page == 'topics' %} active{% endif %}" href="{{ url_for('admin_topics') }}">Темы</a>
        <a class="nav-link{% if active_page == 'appeals' %} active{% endif %}" href="{{ url_for('admin_appeals') }}">Обращения</a>
        <button type="button" id="logout-btn" class="nav-link btn btn-link text-start px-0 mt-2">Выход</button>
      </nav>
    </aside>

    <main class="admin-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block modals %}{% endblock %}

  <div id="toast-container" class="toast-container"></div>
  <template id="toast-template">
    <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
      </div>
    </div>
  </template>

  <script>window.BACKEND_API_URL = {{ backend_api_url | tojson }};</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
