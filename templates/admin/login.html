<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Админ-панель</title>
  <link rel="icon" href="{{ url_for('favicon') }}" type="image/png" sizes="16x16">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body data-page="admin-login" class="login-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-3">Вход в админ-панель</h1>
      <form id="login-form">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" required autocomplete="username">
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Пароль</label>
          <input type="password" id="password" class="form-control" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn login-page__submit w-100">
          <span class="spinner-border spinner-border-sm btn-spinner d-none" role="status" aria-hidden="true"></span>
          Войти
        </button>
      </form>
      <a href="{{ url_for('index') }}" class="d-block mt-3 small text-center">На главную</a>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <template id="toast-template">
    <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
      </div>
    </div>
  </template>

  <script>window.BACKEND_API_URL = {{ backend_api_url | tojson }};</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
