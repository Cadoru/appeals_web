<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подача обращения</title>
  <link rel="icon" href="{{ url_for('favicon') }}" type="image/png" sizes="16x16">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body data-page="public">
  <div class="container py-5 public-page">
    <div class="public-logo mb-4 text-center">
      <img
        src="{{ url_for('static', filename='img/altatec-logo.png') }}"
        alt="Altatec"
        class="public-logo__img"
        width="280"
        height="auto"
      >
    </div>

    <form id="appeal-form" class="card shadow-sm appeal-form">
      <div class="card-header appeal-form__header text-center">
        <h1 class="h5 mb-0 appeal-form__title">Подача обращения</h1>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label for="topic_id" class="form-label">Тема</label>
          <select id="topic_id" class="form-select" required>
            <option value="">Загрузка тем…</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="appeal-text" class="form-label">Текст обращения</label>
          <textarea
            id="appeal-text"
            class="form-control"
            rows="6"
            maxlength="5000"
            placeholder="Опишите суть обращения (до 5000 символов)"
            required
          ></textarea>
          <div class="form-text">Не более 5000 символов</div>
        </div>

        <div class="mb-4">
          <label for="appeal-files" class="form-label">Файлы (необязательно)</label>
          <input
            type="file"
            id="appeal-files"
            class="form-control"
            multiple
          >
          <div class="form-text">Каждый файл — не более 10 МБ</div>
        </div>

        <button type="submit" id="submit-appeal" class="btn appeal-form__submit" disabled>
          <span class="spinner-border spinner-border-sm btn-spinner d-none" role="status" aria-hidden="true"></span>
          Отправить
        </button>
      </div>
    </form>

    <p class="text-center mt-3 mb-0">
      <a href="{{ url_for('admin_login') }}" class="small">Вход для администратора</a>
    </p>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <template id="toast-template">
    <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
      </div>
    </div>
  </template>

  <script>window.BACKEND_API_URL = {{ backend_api_url | tojson }};</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
